# Large dense config (350M params)
model:
  vocab_size: 50257
  seq_len: 2048
  d_model: 1024
  d_ffn: 4096
  N: 1
  k_max: 1
  r: 64
  S: 4
  d_k: 256
  d_A: 1024
  d_B: 1024
  num_loops: 3
  halt_threshold: 0.99
  lambda_gate: 3.0
  gamma_init: 0.05
  use_rope: true
  n_layers_A: 12
  n_layers_B: 12
  n_heads: 16
  n_kv_heads: 16
  bf16_pool: true
  compute_dtype: bfloat16

train:
  total_steps: 200000
  steps_per_window: 32
  batch_size: 64
  lr_pool: 2.0e-5
  lr_transformer: 8.0e-5
  warmup_steps: 2000
  grad_clip_norm: 1.0
  remat: true

sharding:
  n_data: 8
  n_model: 2

data:
  source: hf
  hf_path: Skylion007/openwebtext
  hf_text_column: text
  hf_tokenizer: gpt2

checkpoint:
  dir: checkpoints/dense_large
  every: 5000
  keep: 5

wandb:
  project: drwa
  name: dense_large_350m